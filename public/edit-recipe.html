<!DOCTYPE html>
<html>
<head>
  <title>Edit Recipe</title>
  <link rel="stylesheet" href="/css/recipeform.css">
</head>

<body>

<div class="form-container">

  <h1 id="form-title">Edit Recipe</h1>

  <form id="recipe-form">
    <div class="section">
      <label>Title</label>
      <input name="title">
    </div>
    <div class="section">
      <label>Times</label>

      <div class="time-row">
        <div class="field">
          <label>⏱Prep Time</label>
          <input type="number" name="prepTime" class="small-input">
        </div>

        <div class="field">
          <label>🔥Cook Time</label>
          <input type="number" name="cookTime" class="small-input">
        </div>

        <div class="field">
          <label>🍽 Servings</label>
          <input type="number" name="servings" class="small-input">
        </div>
      </div>
    </div>
    <div class="section">
      <label>🍅 Ingredients</label>
      <textarea name="ingredients"></textarea>
    </div>

    <div class="section">
      <label>👨‍🍳 Instructions</label>
      <textarea name="instructions"></textarea>
    </div>
    <div class="section">
      <label>🖼️ Icon URL</label>
      <input name="image">
    </div>
    <button type="submit" id="submit-btn">Save Changes</button>

  </form>

  <a href="/recipes.html">Back to Recipes</a>

</div>

<script src="/js/edit-recipe.js"></script>

</body>
</html>
